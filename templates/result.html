{% extends "base.html" %}
{% block content %}
  <div class="page-header">
    <div>
      <h1>Yükleme Sonucu</h1>
      <p>İşlem tamamlandı. Sonuç detayları aşağıda yer almaktadır.</p>
    </div>
  </div>

  <div class="panel card result-panel">
    <div class="result-card">
      <div class="result-badge {{ 'success' if status == 'Başarılı' else 'error' }}">{{ status }}</div>
      <div class="result-details">
        <p><strong>Mesaj:</strong> {{ message }}</p>
        <p><strong>Yüklenen Satır Sayısı:</strong> {{ row_count }}</p>
      </div>
    </div>

    <div class="action-row">
      <a class="secondary-button" href="{{ url_for('index') }}">Yeni Yükleme</a>
      <a class="secondary-button" href="{{ url_for('history') }}">Geçmiş Yüklemeler</a>
    </div>
  </div>
{% endblock %}
